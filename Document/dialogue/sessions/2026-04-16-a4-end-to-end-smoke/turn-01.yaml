peer_review:
  project_analysis: |
    Why Step 0 precedes the smoke body.

    Codex Turn 2 of 2026-04-16-a4-acquisition-followup sealed the
    acquisition-followup session by independently reproducing chat
    acquisition for W5 and W4 offset, the re-measurement arithmetic,
    the schema fix, the cookie non-leak, and the sister validators.
    That seal explicitly moved cross-session aggregation out of the
    acquisition-track and into the smoke contract as Step 0:

      "Open 2026-04-16-a4-end-to-end-smoke next, but attach
       cross-session aggregation as Step 0 in that contract."

    Step 0 is deterministic bookkeeping over three existing raw JSONs.
    It is not another acquisition round. Running it at the top of this
    contract lets the smoke body answer two independent questions in
    one session: (a) is A4 promotion ready as of the current raw
    set? and (b) does the end-to-end pipeline still run clean on
    current defaults?

    Step 0 surfaced a documentary overclaim from the prior session.
    The acquisition-followup seal said "{W1, W2, W3, W4f, W5f} = 5
    valid cells if aggregated." The honest evaluate_global output is
    covered_cell_count=3. W1/W2/W3 are all insufficient_data=true in
    the committed 2026-04-15 A4 raw JSON (every chunk shows the
    cache-warm retry-collapse: initial pair also cache-hot, so
    user_attributable ~= 2 and user_ratio ~= 0.0003 on all 12 rows).
    Pooling the no-chat W5 cell (P95=4.69) with the chat-fed cells
    (P95 ~= 3.0) now also violates dispersion. A4 promotion stays
    deferred, with the next required work being re-measurement of
    W1/W2/W3 under a protocol that survives the 5-minute prompt-cache
    TTL.

    Smoke body rationale: VOD 11688000 was picked because the 144p
    mp4 is already present in sister work/ (short-circuits download
    but still exercises the cookies-gated NetworkManager
    get_video_info path), because its chat is cookieless, and
    because the cell (W5f) is already characterized so smoke-output
    interpretation is anchored against known-good measurement.

    The smoke invocation uses python -m pipeline.main --process
    11688000 --limit-duration 1800. That is the canonical runtime
    entry point. Running it from the sister cwd lands outputs under
    sister ./output and sister ./work (per the relative paths in
    pipeline_config.json) and keeps the live worktree untouched.

