contract:
  status: accepted
  checkpoints:
    - id: C1
      description: "Re-anchor the A2 baseline from live files before any A3 measurement: (a) pipeline/chunker.py:156-201 tokenizes c.raw_block via tiktoken cl100k_base (split_by_tokens), (b) pipeline/main.py:191-197 passes max_tokens=cfg.get('chunk_max_tokens') alongside max_chars, encoding the chunk_max_tokens>chunk_max_chars precedence, (c) pipeline/config.py:23-27 DEFAULT_CONFIG holds chunk_max_tokens=None + chunk_tokenizer_encoding='cl100k_base', (d) pipeline/claude_cli.py:23-58 _log_usage() emits input_tokens/output_tokens/cache_creation_input_tokens/cache_read_input_tokens as separate fields, (e) experiments/results/2026-04-15_phase-a2_token-chunking.md §5 records predicted=9,906 vs observed sum=38,518 with user-attributable≈17,850 yielding the provisional 1.8x rule."
      verification: "experiments/results/2026-04-15_phase-a3_token-margin-sampling.md §1 (Baseline) must re-quote all five anchors with file:line citations read at execute-turn run time. Paraphrasing A2 doc summary is insufficient."
    - id: C2
      description: "A3 first execute slice is narrowed to **Option B: single-sample, multi-chunk measurement** on work/12702452/*clip1800s.srt + work/12702452/12702452_chat.log. Generalization across length/genre/density is explicitly BLOCKED by sample scarcity and deferred to a follow-up slice (A3b or A4), not silently skipped. The contract records the blocker: 'repo today exposes only 1 raw SRT+chat pair; 1h/3h and game/song genres require pipeline.downloader runs + chzzk cookies + storage capacity before cross-axis generalization is possible; acquisition is out of A3 Turn 4 scope.'"
      verification: "§2 (Sample set) of the result doc must state 'Option B selected; single-sample multi-chunk' verbatim, enumerate the one available pair with file paths + length (30 min) + genre (talk, w. 지누/뿡/똘복) + chat density tier (measured msgs/min from 12702452_chat.log), AND contain a §2.x subsection titled 'Blockers: cross-axis generalization' that names pipeline.downloader + cookies + disk + time as the prerequisites and states generalization is out of scope for Turn 4 execute."
    - id: C3
      description: "Per-chunk measurement protocol records **both cold and warm runs** per chunk and fixes the authoritative user_ratio formula. Cold run = first invocation of a fresh Claude CLI session against the chunk; its `cache_creation_input_tokens` represents the newly-cached user prompt, and `cache_read_input_tokens` represents the Claude CLI system prompt (persistent 1h cache, irrelevant to user margin). Warm run = second invocation of the same chunk within 5 minutes of the cold run; `cache_creation_input_tokens` should drop to ~0 while `cache_read_input_tokens` should grow to approximately cold's (cache_creation + cache_read). Authoritative metric: `user_attributable_cold = input_tokens_cold + cache_creation_input_tokens_cold` and `user_ratio = user_attributable_cold / predicted_prompt_tokens`. Warm run is a **consistency check**: `(cache_read_warm - cache_read_cold)` must equal `user_attributable_cold` within ±3% tolerance; deviation above that invalidates the chunk and requires a re-run. `predicted_prompt_tokens` is defined as `len(tiktoken.get_encoding('cl100k_base').encode(prompt))` where `prompt` is the full string returned by `pipeline.summarizer._build_chunk_prompt(chunk, highlights, chats, vod)` — i.e. instruction block + chat_section + transcript combined, not transcript alone."
      verification: "§3 (Protocol) of the result doc must state: (a) the exact predicted_prompt_tokens definition verbatim with _build_chunk_prompt citation, (b) both cold and warm run procedures with 5-minute gap enforcement, (c) the authoritative user_ratio formula using cold run's (input + cache_creation), (d) the cold-vs-warm consistency check (±3%) with re-run rule, (e) one complete row per chunk showing both cold and warm usage fields so an independent reviewer can recompute user_ratio."
    - id: C4
      description: "**Distribution-based decision rule** (replaces Turn 1's [1.6,2.0] band). The goal of A3 is to ESTIMATE recommended_margin from observed data, not to confirm 1.8x. Computation: for each valid chunk (cold/warm consistency within ±3%), compute user_ratio_chunk. Aggregate: sample_median_user_ratio, sample_P95_user_ratio, global_median across available samples. **recommended_margin = ceil(global_P95 * 1.05 * 100) / 100** (5% safety factor above P95, rounded up to 2 decimal places). FAIL outcomes (experiment cannot produce a recommendation): (i) n_chunks_valid < 3 after consistency filtering = 'insufficient data', (ii) >25% of chunks fail the cold/warm ±3% consistency check = 'protocol breakage', (iii) only one sample (genre/length/density axis) available for the recommendation = 'generalization-blocked — recommendation valid only for 30-min Korean talk + chat density X msgs/min' (reported with bounds, not discarded). The 1.8x provisional value is a prior expectation, not a success criterion; the experiment passes whenever a recommended_margin is computed with non-FAIL outcomes (ii) and (iii-generalized) honored."
      verification: "§4 (Decision framework) of the result doc must contain: (a) the exact recommended_margin formula verbatim (ceil(P95 * 1.05 * 100) / 100), (b) the three FAIL conditions verbatim, (c) the aggregation schema (chunk-level → sample-level → global), (d) a computed example using the A2 single datapoint (user_ratio=1.80 → if that were the only point, report 'insufficient data' per condition i), (e) explicit statement that recommendation scoped to 30-min Korean talk is valid but not generalizable without new samples. §5 (Recommendation) is the Turn 4+ output placeholder."
    - id: C5
      description: "Agent assignment unchanged from Turn 1/Turn 2. claude-code owns the first live measurement pass because codex-side `claude -p 'Reply with OK-A3-PROBE' --output-format json --max-turns 1` returned authentication_error 401 at A2 Turn 3 (2026-04-14), A2 Turn 5 (2026-04-14), and Turn 2 of this session (2026-04-14 KST, three consecutive sessions). Codex's A3 role: (a) peer-review contract and logs, (b) recompute user_ratio and P95 independently from claude-code's raw usage lines. Reassignment trigger: if codex auth becomes 200 on any future probe, the next execute slice reassigns measurement ownership; the probe must be run at the start of every codex turn from now on."
      verification: "§6 (Execution assignment) of the result doc records the three-turn 401 history, names claude-code as measurement owner, defines codex's recomputation role with its input (claude-code log file paths), and records the re-probe rule."

  amendments:
    - id: A1
      origin: codex-turn-02
      affects:
        - C2
      status: accepted
      rationale: "Accepted without modification. Live inventory check confirmed only work/12702452/*clip1800s.srt + 12702452_chat.log exist as raw SRT+chat; output/12402235_* is html/md/metadata (downstream artifacts, not measurable inputs). Turn 1's 'at least 3 concrete rows' verification text was not executable under this inventory. Chose Option B (single-sample multi-chunk) over Option A (acquisition-first) because: (1) pipeline.downloader requires valid chzzk cookies + network + storage that none of the current DAD turns have negotiated, (2) acquisition timelines are unpredictable (VOD availability, download speeds, rate limits), (3) Option B still produces a directly useful output — a bounded recommendation for 30-min Korean talk that covers the current VOD category workflow, while cross-axis generalization is flagged as a deferred slice. A3b/A4 can acquire additional samples once the single-sample methodology is validated in Turn 4."
    - id: A2
      origin: codex-turn-02
      affects:
        - C3
      status: accepted
      rationale: "Accepted and expanded. 'Measure the second call' was under-specified because Claude CLI's cache has independent lifecycle relative to the user prompt: on a second call, cache_read includes BOTH the CLI system prompt (persistent) AND the user prompt (cached 5 minutes earlier). Isolating user contribution requires paired cold/warm runs. Contract now defines: cold run's (input + cache_creation) = user prompt bytes (authoritative for user_ratio), warm run's (cache_read_warm - cache_read_cold) = same quantity seen from the opposite direction (consistency check with ±3% tolerance). This double-sided measurement catches protocol breakages (e.g. cache eviction during the 5-min gap, or Claude CLI system prompt update between cold and warm) that a single-call protocol would silently mask. Added explicit predicted_prompt_tokens formula pointing to _build_chunk_prompt so future reviewers cannot conflate 'prompt' with 'transcript only'."
    - id: A3
      origin: codex-turn-02
      affects:
        - C4
      status: accepted
      rationale: "Accepted with concrete reformulation. The [1.6, 2.0] band was a success criterion disguised as a pre-registration — if all measured ratios clustered at 2.2x, the rule would force FAIL even though the operational output 'recommend 2.2x' would be more correct than 'insufficient evidence for 1.8x'. The amended C4 reframes A3's job as *estimating* the margin: recommended_margin = ceil(global_P95 * 1.05 * 100) / 100, a distribution-based computation with a 5% safety factor above the 95th percentile. FAIL is now reserved for operational failures (insufficient data, protocol breakage, single-axis generalization claim) rather than for observed ratios disagreeing with the 1.8x prior. This aligns with progress_report.md's stated Phase A4 plan (end-to-end verification) which needs a real operational margin, not a confirmation ritual."

