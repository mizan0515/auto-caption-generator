    - id: C2
      description: "Define and confirm the A3 sample set on three axes: length (30min / 1h / 3h), genre (talk / game / song, or the closest available substitutes), and chat density (low / medium / high msgs-per-minute). Enumerate candidate samples from the current repo (work/, output/, experiments/results/) with file paths and known metadata. Any axis point that cannot be covered by existing repo artifacts is recorded as a blocker with the minimum action needed to obtain the sample."
      verification: "§2 (Sample set) must list at least 3 concrete <SRT_path, chat_log_path, length_min, genre, density_tier> rows, AND a separate 'blockers' subsection for any axis cell that cannot be satisfied today. Current live inventory shows only work/12702452/*clip1800s.srt + work/12702452/12702452_chat.log exist (30-min talk clip), so C2 proof must include a concrete acquisition plan (e.g. 'download full-length 12702452 VOD via pipeline.downloader', 'pull 12402235 chat.log from chzzk') or a scope cut."
    - id: C3
      description: "Define the per-chunk measurement protocol so every datapoint is reproducible and comparable: for each (sample, chunk_index) pair record predicted_prompt_tokens (tiktoken cl100k_base on the exact string produced by _build_chunk_prompt), observed_input_tokens, observed_cache_creation_input_tokens, observed_cache_read_input_tokens, observed_sum, user_attributable (input+cache_creation), absolute_delta (sum − predicted), user_ratio (user_attributable / predicted), sample_metadata {length_min, genre, density_tier, chunk_index, chunk_cue_count}. The protocol must explicitly separate cache_read from user_attributable because A2 showed ~20k of cache_read is Claude CLI's own system prompt, not user prompt."
      verification: "§3 (Protocol) must contain the complete field list, the exact invocation (call_claude or equivalent wrapper via pipeline.summarizer._build_chunk_prompt), and a rule for warm-cache control (e.g. 'measure the second call after a cache-warming call, not the first') so user_ratio is not contaminated by cache_creation being abnormally high on first hit. Must also define the single-point aggregation: mean/median of user_ratio across chunks, with n and stdev."
    - id: C4
      description: "Pre-register the result-doc table schema and the PASS/FAIL decision rule for the 1.8x operational margin. Schema: one row per (sample, chunk_index) with the fields from C3, plus per-sample summary rows (median user_ratio, 95% range, n_chunks). Decision rule: margin gets promoted from 'provisional 1.8x' to an operational recommendation IFF (a) n >= 3 samples, (b) user_ratio is in [1.6, 2.0] for at least 75% of chunks, (c) outliers are explained (genre/density), (d) the recommended margin accounts for the observed spread (e.g. 'use 2.0x as safety margin' if P95 is 2.0). Otherwise C4 reports 'insufficient evidence to generalize 1.8x' and scopes the follow-up."
      verification: "§4 (Decision framework) must include the table schema with column names + types AND the four-clause decision rule verbatim. §5 (Recommendation) is the placeholder where Turn 2+ execute will fill in {recommended_margin, confidence, known_limits}."
    - id: C5
      description: "Assign C3 live measurement execution per agent capability: claude-code owns the first measurement pass because codex-side `claude -p --output-format json` still returned 401 in A2 Turn 3 and remained unresolved through A2 Turn 5. Codex role in A3 is peer review + independent recomputation from logs claude-code produces. If codex auth recovers between turns, C5 is re-scoped. The assignment must be explicit in the packet so execute Turn cannot silently skip live calls due to 'auth was 401'."
      verification: "§6 (Execution assignment) must name the agent per measurement pass, cite the A2 Turn 3 and Turn 5 401 observations, and state the fallback ('if codex auth recovers, re-assign at start of execute turn'). If claude-code auth also breaks, the packet must downgrade C5 to measurement-blocked rather than silently skip."

