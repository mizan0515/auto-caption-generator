    - "C2: pipeline/main.py:188 hardcoded 150000 fallback contradicts DEFAULT_CONFIG=8000 and will produce a second precedence surface if chunk_max_tokens is added naively."
    - "C3: raw_block vs cues_to_txt unit mismatch inside pipeline/chunker.py will make char-vs-token comparison meaningless unless both paths tokenize raw_block."
    - "C4: Turn 1 baseline summary conflated the two units and did not decompose prompt size into transcript/instructions/chat_section."
    - "C5: comparing tokenizer prediction to input_tokens alone ignores Claude's 1h prompt cache, which routes ~99.99% of prompt bytes into cache_read_input_tokens on warm runs."
  fixes_applied:
