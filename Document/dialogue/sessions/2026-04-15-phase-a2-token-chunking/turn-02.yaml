contract:
  status: amended
  checkpoints:
    - id: C1
      description: "Pick the A2 tokenizer by comparing concrete candidates — tiktoken(cl100k_base), anthropic SDK count_tokens endpoint, and a char÷4 heuristic — across six axes: dependency surface, license, offline/airgapped behavior, version/schema stability, speed on 10 KB transcripts, and observed closeness to A1 Claude usage totals."
      verification: "Turn 2+ (amended Turn 3 execute) must include a decision record naming the selected tokenizer, enumerating all three candidates, and filling all six axes. If a candidate is rejected for an axis (e.g. anthropic count_tokens requires network), the record must say so explicitly rather than leaving the cell blank."
    - id: C2
      description: "Add chunk_max_tokens to pipeline/config.py DEFAULT_CONFIG AND reconcile the legacy fallback at pipeline/main.py:188 (currently hardcoded 150000, inconsistent with DEFAULT_CONFIG chunk_max_chars=8000). Define precedence in a single comment block covering: DEFAULT_CONFIG, pipeline_config.json merge, main.py fallback, and which key wins when both chunk_max_chars and chunk_max_tokens are set."
      verification: "Execute-turn diff must touch pipeline/config.py AND pipeline/main.py, keep char-based keys intact, and load_config() must return both keys present. A small test (or REPL evidence) must show (a) legacy-only config still chunks by chars, (b) new-only config chunks by tokens, (c) both-set resolves per the documented precedence."
    - id: C3
      description: "Introduce a token-based chunking path in pipeline/chunker.py without breaking char-based behavior. The token-counting unit must be the SAME string the splitter evaluates today — i.e. per-cue `raw_block` — NOT the cues_to_txt output, because the current splitter at pipeline/chunker.py:102 thresholds on `len(cues[j].raw_block)` while pipeline/chunker.py:159 only reports cues_to_txt length as `char_count`. Document this unit decision in the function docstring so future readers don't conflate the two."
      verification: "Execute-turn code must: (a) keep split_by_chars() intact, (b) add split_by_tokens(cues, max_tokens, overlap_sec, tokenizer) that calls tokenizer on cues[j].raw_block and accumulates the same way, (c) chunk_srt() selects the path based on config, (d) overlap semantics (rewind by overlap_sec) remain identical for both paths. Unit-level evidence: same SRT input into both paths must produce byte-for-byte identical overlap boundaries when max_tokens and max_chars are calibrated to target the same split points."
    - id: C4
      description: "Record a same-source comparison table for the 30-minute `work/12702452/*clip1800s.srt` sample in experiments/results/2026-04-15_phase-a2_token-chunking.md, showing for each config (150k, 15k, 8k, 5k char + matched-ish token configs): chunk count, per-chunk raw_block-char sum (the split unit), per-chunk cues_to_txt char_count (the reported unit), per-chunk tokenizer count of raw_block, per-chunk assembled prompt char size, and per-chunk tokenizer count of the assembled prompt. Call out the unit mismatch (raw_block vs cues_to_txt) explicitly so the table is not read as contradictory."
      verification: "Result doc must contain a markdown table with all six columns filled for at least four configs, plus a short paragraph explaining why raw_block and cues_to_txt diverge by ~2x. Use work/12702452/*clip1800s.srt and work/12702452/*chat.log as declared source — do NOT reparse a different sample."
    - id: C5
      description: "Measure tokenizer-predicted prompt tokens against live Claude usage for at least one chunk. The comparison baseline on the Claude side must be `input_tokens + cache_creation_input_tokens + cache_read_input_tokens` (sum of all three from A1's _log_usage output) — NOT input_tokens alone, because Claude's 1h prompt caching routes most of the prompt into cache_read_input_tokens (A1 reproduction observed input_tokens=3 vs cache_read_input_tokens=27737 on a 30-minute sample). The predicted-vs-actual row in the result doc must report all three fields separately AND the sum."
      verification: "At least one real Claude-backed call via pipeline/summarizer.py's chunk path (or an equivalent wrapper invocation that reuses _build_chunk_prompt) must be captured in the A2 result doc, with: predicted prompt tokens from the chosen tokenizer, observed input_tokens, observed cache_creation_input_tokens, observed cache_read_input_tokens, observed sum, and the absolute+relative delta between prediction and sum. If codex-side Claude auth remains 401, the execute turn must either (a) explicitly delegate the C5 run to claude-code side, or (b) record the 401 blocker with the exact retry evidence and downgrade C5 to 'partial — predicted-only, observed TBD.' Any path other than one of those two is a contract violation."
  amendments:
    - id: A1
      origin: "Turn 2 (claude-code) peer review"
      affects: C1
      rationale: "Turn 1's C1 named 'Anthropic-compatible tokenizer' as if it were an installable package. Anthropic does not ship a first-party tokenizer for Claude 3/4 as a pip library; the realistic candidates are tiktoken(cl100k_base) as approximation, the SDK's count_tokens HTTP endpoint (requires network + credits), or a char÷4 heuristic. C1 must enumerate these three and add version-stability and speed axes (6 axes total), because tiktoken's encoding cache updates can change counts silently between minor versions and because A2 will tokenize inside a hot loop."
    - id: A2
      origin: "Turn 2 (claude-code) peer review"
      affects: C2
      rationale: "pipeline/main.py:188 uses cfg.get('chunk_max_chars', 150000) as a hardcoded fallback that contradicts DEFAULT_CONFIG=8000 at pipeline/config.py:19. This is dead branch only while load_config() is the entrypoint; it stops being dead the moment someone instantiates the pipeline without load_config(). Execute turn cannot quietly add chunk_max_tokens without also reconciling this fallback, otherwise the two new-key/legacy-key precedence cases explode into four. C2 now requires touching main.py as well as config.py."
    - id: A3
      origin: "Turn 2 (claude-code) peer review"
      affects: C3
      rationale: "Splitter uses len(cues[j].raw_block) at pipeline/chunker.py:102; reports char_count=len(cues_to_txt(chunk_cues)) at pipeline/chunker.py:159. These are ~2x apart on the cached 30-min sample (threshold 8000 raw_block → ~4.9k/3.7k cues_to_txt text). Token path must tokenize the SAME string the char splitter accumulates, i.e. raw_block, otherwise token_max_tokens and chunk_max_chars become incomparable units and C4's comparison table degenerates into noise. Choosing raw_block is also simpler because overlap math already uses cue indices."
    - id: A4
      origin: "Turn 2 (claude-code) peer review"
      affects: C4
      rationale: "Turn 1 baseline summary shows 'transcript 4,922 chars' against an 8k threshold but never states that the 8k gates raw_block, not transcript. Reviewers will read this as 'splitter leaves 3k of slack' and make wrong calibration choices. The comparison table must surface both raw_block and cues_to_txt columns so the 2x gap is visible; otherwise the whole experiment is methodologically unsound."
    - id: A5
      origin: "Turn 2 (claude-code) peer review"
      affects: C5
      rationale: "A1 reproduction evidence (pipeline INFO Claude usage input_tokens=3 output_tokens=7 cache_creation_input_tokens=0 cache_read_input_tokens=27737) shows that Claude's 1h prompt cache routes the overwhelming majority of prompt bytes into cache_read_input_tokens. Comparing a tokenizer prediction against input_tokens alone would fail by 4 orders of magnitude on a 30-minute sample. C5 must explicitly compare against the sum of all three usage fields, report each field separately, and keep cache warming state out of the error analysis. Also adds an explicit blocker-delegation clause so the codex-side 401 cannot be used to silently skip C5."

