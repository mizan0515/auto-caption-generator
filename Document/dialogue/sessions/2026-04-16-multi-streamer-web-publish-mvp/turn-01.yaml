peer_review:
  project_analysis: |
    이 세션을 "멀티 스트리머 + 웹 퍼블리시 MVP 첫 vertical slice"로 정의한 이유:
    (1) 직전 세션 2026-04-16-a4-end-to-end-smoke 에서 파이프라인 자체는 이미 end-to-end smoke 을 통과했다. 기본 기능은 증명되었고, A4 promotion 은 별도 cache-TTL 세션으로 격리됨.
    (2) 제품 관점에서 남은 큰 결손은 (a) 사용자가 파이프라인 산출물을 "목록-상세-검색" 제품으로 소비할 경로가 없고, (b) 파이프라인 전체가 단일 스트리머를 전제로 굳어 있다는 점. 이 둘은 교차한다 — publish 레이어를 다시 만들지 않고서는 multi-streamer 를 물어도 보여줄 곳이 없다.
    (3) 세션을 "multi-streamer data model" 과 "web publish" 각각으로 쪼갤 수 있지만, runtime 을 건드리지 않고 publish-view 만으로 두 축을 동시에 풀 수 있다는 것이 이번 슬라이스의 핵심이다. 그래서 하나의 세션 = 하나의 실제 산출 (= 로컬에서 빌드 가능하고 무료 호스팅 가능한 web MVP) 원칙을 지키면서 두 축을 같이 닫는다.
    (4) A4 재측정, 증분 빌드, 실 배포 계정 연동은 명시적으로 P3/P4/P6 에서 다음 세션으로 미뤘다. 본 세션은 "schema + builder + UI + docs" 첫 슬라이스만 완결한다.
