      description: "Separate acquisition slice from measurement slice. Acquisition turns are scoped to obtaining raw SRT + chat.log pairs for each uncovered cell; measurement turns run the A3 C3 protocol exactly (tiktoken cl100k_base on _build_chunk_prompt, cold/warm pairs, ±3% consistency, ceil(P95 * 1.05 * 100) / 100). Acquisition options per cell: (a) re-transcribe the existing full-length work/12702452_*144p.mp4 to get the length axis's 30-min→full-VOD extension; (b) use pipeline.downloader / Chzzk cookies to fetch new VODs for other cells; (c) accept uncovered cells as out-of-scope and mark blockers. A measurement turn must not begin until the acquisition slice for that turn's target cells is complete and recorded in work/."
