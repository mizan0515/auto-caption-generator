      description: "Pre-register the A4 result-doc schema: one row per (cell, sample, chunk_index) with columns sample_id, length_min, genre, density_tier, chunk_index, predicted_prompt_tokens, input_tokens, cache_creation_input_tokens, cache_read_input_tokens, user_attributable_cold, cache_read_delta, consistency_pass (bool), user_ratio, additive_overhead (= user_attributable_cold − predicted), plus per-cell aggregate rows with n_chunks, median_user_ratio, P95_user_ratio, median_additive_overhead. The global section must publish BOTH candidate forms: multiplicative (single scalar margin) and additive (+~7.5k constant + CLI cache 20,668). Decision rule: if C2's ±15% spread holds across cells, publish one global multiplicative margin; otherwise publish per-cell margins plus the shared additive form."
      verification: "§4 (Result doc schema) lists the full column set above, and §5 (Decision rule) states the four possible outcomes (global multiplicative, global additive, per-cell multiplicative, scope-blocked) with the quantitative condition that selects each."
