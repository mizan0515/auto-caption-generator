      description: "Pre-register the generalization matrix and the minimum sample threshold for promoting A3's scoped 3.35x to a repo-wide rule. Axes: length ∈ {30 min, 1 h, 3 h}, genre ∈ {talk, game, reaction-or-music}, chat_density ∈ {low ≤ 20 msgs/min, medium 20–60 msgs/min, high > 60 msgs/min}. A3's only sample sits at (30 min, talk, high ≈ 76.21 msgs/min). Promotion rule (proposed for amendment): a cell is 'covered' when ≥ 3 chunks were measured under the A3 C3 protocol and all passed the ±3% consistency check; a global recommendation is allowed only when ≥ 5 distinct cells are covered AND the P95 user_ratio spread across cells is within ±15% of the current 3.35x, otherwise the MD must publish per-cell recommendations rather than a global one. Additive-overhead form (Δ ≈ 7.5k + CLI cache 20,668) is retained as the alternative operational equation in §6.3 of the A3 doc."
      verification: "§2 (Matrix + threshold) of the plan packet must list all 9 axis cells, mark the A3-covered cell explicitly, and state a concrete count threshold. Turn 2 (codex peer review) either accepts the thresholds or proposes an amendment with falsifiable numbers; no execute turn starts on an 'elastic' threshold."
