  open_risks:
    - "실 Cloudflare/GitHub 계정 연동 배포는 본 슬라이스에서 실행되지 않았다. wrangler login + wrangler pages deploy, 또는 GitHub Pages workflow 의 manual run 은 사용자 수동 트리거가 필요하다. scaffold 의 정합성은 8-test verifier 가 끝까지 시뮬레이션했지만, Cloudflare/GitHub 측 실제 응답까지는 검증 범위 밖이다."
    - "preflight 의 외부 CDN 경고는 vods/<video_no>/report.html 이 chart.js + Google Fonts 를 https 로 직접 로드한다는 사실을 잡아낸다. 이는 본 scaffold 가 만들어낸 의존이 아니라 런타임 파이프라인의 리포트 HTML 산출물에서 옴 -- Cloudflare/GH Pages 양쪽 모두 외부 도메인으로의 요청이 가능하므로 배포 자체는 작동하지만, 오프라인/regulated network 환경에서는 깨진다. 별도 슬라이스에서 self-host 또는 CSP 게이트 결정이 필요."
    - "site/ 가 .gitignore 로 제외되는 본 저장소 특성상 GH Pages 워크플로우는 즉시 자동으로 작동하지 않는다. 사용자가 publish 브랜치 운영(A) / .gitignore 변경(B) / 별도 빌드 워크플로우 + artifact download(C) 중 하나를 결정해야 한다. workflow 파일 헤더 주석에 명시했지만, 실 적용은 사용자 환경에 따라 후속 슬라이스로 분리될 수 있다."
    - "NID_AUT 검출 정규식은 단어 경계 기반(\\\\bNID_AUT\\\\b)이므로, base64 등으로 난독화된 쿠키 변형은 잡히지 않는다. 본 슬라이스는 'pipeline_config.json 직접 노출' 같은 단순 사고를 막는 목적의 1차 방어선. 더 강한 시크릿 스캔이 필요하면 trufflehog/gitleaks 같은 외부 툴 통합이 필요하다."

  decisions:
    - "deploy meta 3종(_redirects/_headers/.nojekyll)을 publish/web/ 에 source-of-truth 로 두고 빌더가 단순 복사 -- Cloudflare/GH Pages 양쪽이 같은 site/ 트리를 그대로 쓰도록 통일."
    - "X-Frame-Options: SAMEORIGIN -- vod.html 이 같은 오리진의 report.html 을 iframe 으로 embed 하므로 DENY 는 본문 화면을 깬다. SAMEORIGIN 이 최소 허용 값."
    - "GH Pages 워크플로우는 workflow_dispatch only -- 의도치 않은 자동 배포 방지. push 트리거 없음."
    - "preflight 는 NID_AUT/NID_SES 누출만 ERROR, 그 외(절대경로/CDN/deploy meta 누락)는 WARNING -- 운영 자유도 보존하면서 누출-게이트만 비협상적으로 운영. CI 화 시 --strict 로 승격 가능."
    - "wrangler.toml 은 repo 루트에 commit -- secrets 없는 deployment metadata 만 들어가므로 안전. wrangler CLI 가 본 저장소 어디서 실행되든 같은 site/ 디렉토리를 가리키게 됨."
    - "8-test verifier 는 한 번에 build+preflight+CLI+TOML+YAML+HTTP+grep 를 모두 검증 -- scaffold 의 어느 한 부분이 회귀해도 즉시 잡히도록 한 단위로 묶음. 외부 의존 없음(stdlib + tomllib + 선택적 PyYAML)."

