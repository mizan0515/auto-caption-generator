peer_review:
  project_analysis: |
    Why this acquisition-followup belongs before smoke.

    Codex Turn 2 of 2026-04-16-a4-genre-acquisition-execute sealed
    the execute session by independently reproducing baseline,
    Step 0 probe, Step 1 non-talk acquisition, Step 2 offset resample,
    cookie non-leak, 2026-04-15 A4 byte-identity, and raw JSON
    arithmetic. Codex also explicitly listed three open risks: the
    labeling schema was unresolved, W5 was no-chat, and W4 was
    insufficient_data. Codex recommended storing both
    platform_category and content_judgement and recommended a
    separate acquisition/measurement follow-up before opening the
    end-to-end smoke session.

    This session executes exactly that: it does not open smoke, it
    does not promote chunk_max_tokens, and it closes the three open
    risks with new artifacts only. The smoke-open authorization is
    now a handoff recommendation, not a decision taken in this
    session.

    Two surprises emerged:

    1. Chzzk VOD chat is a cookieless public API. `fetch_all_chats`
       never uses the config cookies. This means the Step 0 cookie
       probe from the previous session is not a prerequisite for
       chat acquisition. It remains a prerequisite for VOD media
       download (`pipeline.downloader.download_vod_144p` goes
       through the Qt-less NetworkManager with cookies).

    2. VOD 11688000 (Winter Olympics) has a real chat log, density
       51.48 msgs/min (medium tier). The previous session's
       "no-chat variant" framing for W5 was a data-absence artifact
       of not having attempted the pull, not a property of the VOD.

    W4 offset (12702452 @1800s) also has chat, density 81.52
    msgs/min. One gotcha: the Chzzk chats API does not honor an
    arbitrary `playerMessageTime` seek value; it only honors the
    `nextPlayerMessageTime` token returned by the previous page. So
    offset pulls must paginate from t=0 and filter the desired
    window post-normalization.

