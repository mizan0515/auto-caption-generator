peer_review:
  project_analysis: |
    Why preflight-only is the correct call right now.

    A3 Turn 5 locked 3.35x as scoped PASS but explicitly forbade
    pipeline config promotion (A3 §6.5). A4 Turn 5 then measured
    three cells and landed on per_cell_multiplicative, explicitly
    refusing global_multiplicative promotion because (a) axis_coverage_ok
    is false (1 genre, nominal 3 density tiers but W2=W3), and
    (b) dispersion_ok is false (W1 P95 3.2008 exceeds the +/-15%
    global-median band [2.2615, 3.0597]). A4 §6.4 records runtime
    cfg decision: chunk_max_tokens stays None. progress_report §0
    reinforces: config change blocked until A3b/A4 scope confirmed.

    Before opening an execute session, three concrete blockers must
    be named and their resolution paths chosen:

    1. Cookie readiness: pipeline_config.json has NID_AUT and NID_SES
       non-empty (field-level), but Chzzk API-level validity is
       untested since the A4 measurement ran without hitting
       content.network.NetworkManager. A naive acquisition session
       that trusts field presence will burn its turn budget on
       network call failures.

    2. W2 = W3 equivalence: A4 §6.2 documents the root cause. Until
       the next execute session samples from a different VOD or a
       non-zero start offset, the length-axis extension is really
       a label extension and the medium/low density separation is
       notional.

    3. Genre coverage: A4 covers only (talk, *). global_multiplicative
       promotion requires >=2 genres. There is no non-talk raw asset
       under work/ and the configured streamer_name is a single
       Chzzk channel whose non-talk VOD availability is not
       established inside this repo.

    A preflight session resolves the three blockers on paper and
    hands the next session a concrete Step 0 / Step 1 / Step 2
    ladder. Opening an execute session directly without this gate
    would either (a) bundle cookie probe + acquisition + smoke and
    stall on the first failure, or (b) guess at the smallest new
    cell set and likely undershoot the promotion rule.

    The session therefore writes no code, no config, no results.
    It only writes DAD artifacts and the sister root state mirror,
    and only on the sister worktree. Live is read-only for asset
    existence and baseline reproduction. Sister validators are
    authoritative; they both pass.
