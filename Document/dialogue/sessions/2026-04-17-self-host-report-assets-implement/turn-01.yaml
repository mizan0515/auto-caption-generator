scope: |
  Per-VOD report HTML 의 외부 CDN 의존(chart.js + Google Fonts) 을 제거해
  publish.deploy.check --strict 와 publish.deploy.package --strict --target all
  이 실 site/ 에 대해 둘 다 PASS 하도록 만든다. chart.js 는 publish/web/assets/
  vendor/ 로 self-host, 폰트는 시스템 fallback stack 으로 단순화. 빌더는 vendor
  파일을 site/ 로 복사하고, 레거시 summarizer 가 만든 output/<base>.html 의 CDN
  URL 은 빌드 시점에 local ref 로 rewrite 한다. 실 Cloudflare/GitHub 계정 push
  는 본 슬라이스 범위 밖.

contract:
  checkpoints:
    C1: "Auth probe -- sister main@d97514e, live d97514e (detached, read-only), remote d97514e, merge-base OK."
    C2: "Dependency audit -- locate exactly where the report HTML emits external CDN URLs (chart.js + Google Fonts) and how build_site materializes them into site/."
    C3: "Self-host implementation -- vendor chart.js at publish/web/assets/vendor/, drop Google Fonts @import for system font fallback stack, patch summarizer template, builder copies vendor + rewrites legacy CDN URLs on copy."
    C4: "Strict deploy capability -- python -m publish.deploy.check --strict and python -m publish.deploy.package --strict --target all both PASS (exit 0) on the real built site/, with zero external URL warnings."
    C5: "Verification + validators -- experiments/self_host_report_assets_verify.py covers CDN-free report HTML + strict preflight + strict package + local serving + cookie hygiene; DAD/Doc validators PASS."

peer_review:
  verdict: "N/A (Turn 1)"
  project_analysis: |
    이전 두 세션(2026-04-16-free-hosting-deploy-scaffold + 2026-04-16-deploy-bundle
    -command-implement) 이 site/ -> dist/deploy/ 패키징을 닫았지만, 실 site/ 에
    대한 publish.deploy.check 가 일관되게 1건의 외부 CDN 경고를 띄웠고
    (vods/<id>/report.html 의 chart.js v4.4.2 jsdelivr CDN <script> + Google Fonts
    @import url(...) 두 줄), --strict 모드에서 bundle 생성이 차단되어 CI 기본값을
    --strict 로 올릴 수 없었다. 권위 source 는 pipeline/summarizer.py 의
    _generate_html() template 이며, build_site._copy_into_site() 가 그 결과
    HTML 을 site/vods/<vid>/report.html 로 그대로 복사한다. 따라서 (a) summarizer
    template 자체에서 CDN 참조를 제거해 newly-generated 리포트가 깨끗하도록 만들고,
    (b) 빌더에서 vendored asset 을 deploy root 로 복사하며, (c) 레거시 output/
    HTML 도 빌드 시점에 rewrite 해 site/ 에 CDN 자국이 남지 않도록 만들어야
    한 단위로 닫힌다. 추가로 vendored chart.js 의 minified payload 는 chartjs.org
    홈페이지 / jsdelivr docs 같은 inert 문서 URL 을 포함하므로, preflight 의 외부
    CDN 스캔이 vendor 디렉토리를 제외하도록 좁혀야 false positive 로 strict 가
    재차 깨지지 않는다.

