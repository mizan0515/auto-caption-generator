scope: |
  무료 정적 호스팅을 위한 deploy bundle CLI 구현. 빌더가 emit 한 site/ 를
  단일 명령으로 Cloudflare Pages Direct Upload 호환 zip 과 GitHub Pages
  upload-pages-artifact 호환 tar.gz 로 패키징한다. preflight 자동 실행,
  실패 시 archive 미생성, --strict 시 경고도 차단, 두 산출물의 byte-level
  결정성, archive 내부 cookie 재스캔까지 포함. 실 Cloudflare/GitHub 계정
  연동 push 는 본 슬라이스 범위 밖.

