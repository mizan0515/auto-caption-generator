    C1: "Auth probe -- sister main@d97514e, live d97514e (detached, read-only), remote d97514e, merge-base OK."
    C2: "Deploy flow audit -- locate insertion point for bundle command (post-build, post-preflight, pre-upload)."
    C3: "Bundle CLI implementation -- publish.deploy.package supports --target cloudflare/github-pages/all, --strict, --rebuild; preflight gating blocks bundle creation on errors."
    C4: "Bundle artifact format -- cloudflare zip + github-pages tar.gz at top-level layout; manifest.json + checksums.txt; deterministic across re-runs."
