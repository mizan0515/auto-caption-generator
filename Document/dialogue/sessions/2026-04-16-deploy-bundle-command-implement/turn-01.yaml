  project_analysis: |
    Session E (2026-04-16-free-hosting-deploy-scaffold) 가 Cloudflare/GH Pages
    양쪽 control plane scaffold 를 깔았고, build_site._copy_web_assets() 가
    deploy meta 3종을 site/ 로 emit 하며, publish/deploy/check.py 가 cookie
    누출을 ERROR 로 게이트한다. 그러나 site/ 디렉토리를 실제 업로드 가능한
    archive 로 변환하는 단계는 사용자가 매번 즉흥 결정해야 했다 -- Cloudflare
    Direct Upload 의 zip drag-and-drop 또는 GH Pages 의 upload-pages-artifact
    가 받아들일 tar.gz 가 그 자리에서 만들어지지 않으면, "preflight 까지는
    자동, 그 다음은 손" 이라는 gap 이 남는다. 또 archive 가 결정적으로
    재생산되지 않으면 sha256 첨부가 무의미해지고, archive 작성 후 cookie
    재스캔이 없으면 site/ 단계의 게이트가 우회될 수 있다. 본 슬라이스가
    그 gap 을 닫는다 -- preflight gating 을 한 번 더 적용해서 errors 가
    있으면 archive 자체를 만들지 않고, deterministic timestamp/uid/gid 와
    빈 gzip header 로 byte-identical 재현을 보장하고, archive 내부의 모든
    entry 를 cookie regex 로 재스캔한다.

