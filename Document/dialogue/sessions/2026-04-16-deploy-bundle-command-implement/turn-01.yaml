  open_risks:
    - "실 Cloudflare/GitHub 계정 연동 push 는 본 슬라이스에서 실행되지 않았다. dist/deploy/cloudflare/site-upload.zip 의 Direct Upload 응답, dist/deploy/github-pages/site-artifact.tar.gz 의 actions/upload-pages-artifact@v3 호환성은 로컬 layout/format 시뮬레이션까지만 검증되었다. 실 응답까지의 검증은 수동 트리거가 필요하다."
    - "preflight 의 외부 CDN 경고 (vods/<id>/report.html 의 chart.js + Google Fonts) 는 본 세션에서도 그대로 잔존한다. --strict 모드에서는 bundle 생성이 차단되므로, CI 자동화에서 --strict 를 켜려면 먼저 P5 의 외부 CDN self-host 또는 CSP 결정을 별도 슬라이스에서 닫아야 한다."
    - "manifest.json 은 absolute path 를 그대로 기록한다 (Windows 환경에서 C:\\github\\... 형태). 산출물이 다른 경로로 복사/배포될 경우 manifest 의 archive_path 는 의미가 없어지고 archive_relpath 만 신뢰 가능하다. CI 환경에서 작업 디렉토리가 안정적이지 않다면 archive_relpath 를 일차 식별자로 써야 한다."
    - "deterministic timestamp 는 1980-01-01 (zip 이 1970 을 표현하지 못함) 로 통일했지만, GitHub Pages 의 upload-pages-artifact action 이 저장된 mtime 을 어떻게 처리하는지에 따라 추후 캐시/diff 동작에 영향을 줄 수 있다. 만약 action 이 mtime 기반 캐시 키를 쓴다면 본 세션의 결정성이 오히려 cache busting 을 약화시킬 수도 있다 -- 실 워크플로우 운영 시 관찰 필요."
    - "_scan_archive_for_cookies 는 zip/tar entry 를 utf-8 errors=replace 로 디코드한 뒤 단어 경계 regex 로 검사하므로, 이미지/바이너리 자산에 우연히 포함된 base64 토큰까지 잡지는 못한다. 본 슬라이스의 게이트는 'site/ 단계에서 텍스트 누출을 우회한 평문 cookie' 만 차단하는 1차 방어선이라는 정의."

  decisions:
    - "Bundle 산출 위치는 dist/deploy/<target>/ 로 고정 -- 기존 .gitignore 가 이미 dist/ 를 제외하고 있어 사고 commit 위험을 추가 도입하지 않는다. .gitignore 에 별도 라인 추가 불필요."
    - "Cloudflare 는 zip, GitHub Pages 는 tar.gz 로 분기 -- 각 플랫폼이 native 로 받아들이는 포맷에 맞춘다. zip 은 Direct Upload 의 dashboard upload 와 wrangler 가 모두 받고, tar.gz 는 actions/upload-pages-artifact 가 내부적으로 만드는 형식과 동일."
    - "결정성 timestamp 는 1980-01-01 -- zip 포맷이 epoch 0 을 표현 불가하기 때문. tar 도 같은 epoch 로 통일해 두 archive 비교 시 mental model 이 한 가지로 유지되도록 함. gzip header 는 mtime=0 + filename=\"\" 로 두어 archive 외부에서 보이는 timestamp 도 제거."
    - "preflight gating 은 errors -> 무조건 차단, warnings -> 비-strict 는 통과/strict 는 차단, 으로 양분 -- check.py 의 게이트 정책과 동일한 시맨틱을 archive 단계에서 한 번 더 적용한다."
    - "archive 작성 후 cookie regex 재스캔 -- preflight 와 logically 중복이지만, site/ 에 변동이 발생한 뒤 사용자가 preflight 를 건너뛰고 직접 zip 을 만드는 시나리오에서 사고를 막기 위한 defense in depth. hit 시 archive 를 즉시 삭제해 부분 산출 잔존을 방지."
    - "atomic write (*.tmp -> replace) -- 빌드 도중 중단되더라도 부분 archive 가 dist/deploy/ 에 남지 않게 한다. 다음 실행이 stale 이라고 오해할 위험 차단."

